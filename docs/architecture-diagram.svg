<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">TaskFlow Cloud Pipeline — Architecture Diagram</text>
  <text x="480" y="52" text-anchor="middle" font-size="11" fill="#64748b">CS487 PA4 · Roll: 26100268 · Resource Group: rg-sp26-26100268 · Region: UK West</text>

  <!-- ── LANE BACKGROUNDS ── -->
  <!-- Azure boundary -->
  <rect x="220" y="68" width="720" height="468" rx="10" fill="#ede9fe" fill-opacity="0.4" stroke="#c4b5fd" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="230" y="84" font-size="10" fill="#7c3aed" font-weight="600">Microsoft Azure (rg-sp26-26100268)</text>

  <!-- ── NODES ── -->

  <!-- User Browser -->
  <rect x="18" y="230" width="130" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="83" y="256" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">User Browser</text>
  <text x="83" y="270" text-anchor="middle" font-size="9" fill="#64748b">HTTPS form submit</text>
  <text x="83" y="283" text-anchor="middle" font-size="9" fill="#64748b">+ status polling</text>

  <!-- GitHub -->
  <rect x="18" y="88" width="130" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="83" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">GitHub</text>
  <text x="83" y="126" text-anchor="middle" font-size="9" fill="#64748b">SyedSafiullahK/CS487-PA4</text>
  <text x="83" y="139" text-anchor="middle" font-size="9" fill="#64748b">GitHub Actions CI/CD</text>

  <!-- App Service -->
  <rect x="238" y="222" width="150" height="76" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="313" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">App Service</text>
  <text x="313" y="263" text-anchor="middle" font-size="9" fill="#ddd6fe">webapp-26100268</text>
  <text x="313" y="276" text-anchor="middle" font-size="9" fill="#ddd6fe">Node.js 22 · Linux</text>
  <text x="313" y="289" text-anchor="middle" font-size="9" fill="#ddd6fe">B1 Plan · UK West</text>

  <!-- Durable Function -->
  <rect x="466" y="222" width="160" height="76" rx="8" fill="#6d28d9" filter="url(#shadow)"/>
  <text x="546" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Durable Function</text>
  <text x="546" y="260" text-anchor="middle" font-size="9" fill="#ddd6fe">func-pa4-26100268</text>
  <text x="546" y="273" text-anchor="middle" font-size="9" fill="#ddd6fe">Python 3.11 · Container</text>
  <text x="546" y="286" text-anchor="middle" font-size="9" fill="#ddd6fe">Orchestrator + Activities</text>

  <!-- AKS -->
  <rect x="710" y="110" width="160" height="76" rx="8" fill="#0369a1" filter="url(#shadow)"/>
  <text x="790" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">AKS Cluster</text>
  <text x="790" y="149" text-anchor="middle" font-size="9" fill="#bae6fd">aks-26100268</text>
  <text x="790" y="162" text-anchor="middle" font-size="9" fill="#bae6fd">validate-api · FastAPI</text>
  <text x="790" y="175" text-anchor="middle" font-size="9" fill="#bae6fd">2× D2s_v3 · LoadBalancer</text>

