  <text x="790" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ACI (report-job)</text>
  <text x="790" y="373" text-anchor="middle" font-size="9" fill="#99f6e4">ci-report-{order_id}</text>
  <text x="790" y="387" text-anchor="middle" font-size="9" fill="#99f6e4">Python · One-shot · Never</text>

  <!-- Blob Storage -->
  <rect x="710" y="450" width="160" height="64" rx="8" fill="#b45309" filter="url(#shadow)"/>
  <text x="790" y="472" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Blob Storage</text>
  <text x="790" y="487" text-anchor="middle" font-size="9" fill="#fde68a">stpa426100268</text>
  <text x="790" y="500" text-anchor="middle" font-size="9" fill="#fde68a">container: reports/</text>

  <!-- ACR -->
  <rect x="466" y="440" width="160" height="64" rx="8" fill="#475569" filter="url(#shadow)"/>
  <text x="546" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Azure Container Registry</text>
  <text x="546" y="477" text-anchor="middle" font-size="9" fill="#e2e8f0">crpa426100268</text>
  <text x="546" y="491" text-anchor="middle" font-size="9" fill="#e2e8f0">func-app:v1 · validate-api:v1</text>

  <!-- Managed Identity -->
  <rect x="238" y="440" width="150" height="64" rx="8" fill="#9f1239" filter="url(#shadow)"/>
  <text x="313" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Managed Identity</text>
  <text x="313" y="477" text-anchor="middle" font-size="9" fill="#fecdd3">mi-pa4-26100268</text>
  <text x="313" y="491" text-anchor="middle" font-size="9" fill="#fecdd3">Storage Blob Contributor</text>

  <!-- ── ARROWS ── -->

  <!-- User → App Service -->
  <line x1="148" y1="262" x2="236" y2="262" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="192" y="255" text-anchor="middle" font-size="8" fill="#64748b">HTTPS</text>

  <!-- GitHub → App Service (deploy) -->
  <line x1="83" y1="144" x2="83" y2="222" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="83" y1="180" x2="238" y2="260" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="115" y="210" font-size="8" fill="#64748b">Actions deploy</text>

  <!-- App Service → Durable Function -->
  <line x1="388" y1="260" x2="464" y2="260" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <text x="426" y="253" text-anchor="middle" font-size="8" fill="#7c3aed">POST /start</text>

  <!-- Durable Function → AKS -->
  <line x1="626" y1="240" x2="708" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="674" y="203" text-anchor="middle" font-size="8" fill="#64748b">POST /validate</text>

  <!-- Durable Function → ACI -->
  <line x1="626" y1="280" x2="708" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="674" y="330" text-anchor="middle" font-size="8" fill="#64748b">create ACI</text>

  <!-- ACI → Blob Storage -->
  <line x1="790" y1="400" x2="790" y2="448" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="808" y="430" font-size="8" fill="#64748b">upload PDF</text>

  <!-- ACR → Durable Function (image) -->
  <line x1="546" y1="440" x2="546" y2="300" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="556" y="380" font-size="8" fill="#94a3b8">image pull</text>

  <!-- ACR → AKS -->
  <line x1="626" y1="460" x2="710" y2="180" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="686" y="340" font-size="8" fill="#94a3b8">image pull</text>

  <!-- Managed Identity → ACI (used by) -->
  <line x1="388" y1="472" x2="708" y2="372" stroke="#9f1239" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="530" y="430" text-anchor="middle" font-size="8" fill="#9f1239">assigned to ACI</text>

  <!-- Legend -->
  <rect x="238" y="90" width="200" height="110" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="248" y="108" font-size="9" font-weight="700" fill="#1e293b">Legend</text>
  <line x1="248" y1="120" x2="278" y2="120" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <text x="284" y="123" font-size="8" fill="#1e293b">HTTP request</text>
  <line x1="248" y1="136" x2="278" y2="136" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="284" y="139" font-size="8" fill="#1e293b">Service call</text>
  <line x1="248" y1="152" x2="278" y2="152" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="284" y="155" font-size="8" fill="#1e293b">Image / identity</text>
  <line x1="248" y1="168" x2="278" y2="168" stroke="#9f1239" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="284" y="171" font-size="8" fill="#1e293b">Managed identity</text>
  <line x1="248" y1="184" x2="278" y2="184" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="284" y="187" font-size="8" fill="#1e293b">CI/CD deploy</text>
</svg>
